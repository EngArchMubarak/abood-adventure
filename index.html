<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Abood's Adventure</title>
<style>
  :root{
    --sky-top:#5ec8f8;
    --sky-bottom:#bdf0ff;
  }
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    overflow:hidden; background:#111;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
  }
  #game-wrap{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#111;
  }
  #stage{
    position:relative;
  }
  canvas{
    width:100%; height:100%;
    display:block;
    background:linear-gradient(var(--sky-top), var(--sky-bottom));
    border-radius:0;
  }
  #hud{
    position:absolute; top:10px; left:10px; right:10px;
    display:flex; justify-content:space-between;
    color:#fff; font-weight:800; text-shadow:0 2px 3px rgba(0,0,0,.5);
    font-size:clamp(14px,2.4vw,22px);
    pointer-events:none;
  }
  #hud .chip{
    background:rgba(0,0,0,.35);
    padding:6px 12px; border-radius:12px;
    display:flex; gap:8px; align-items:center;
  }
  #toast{
    position:absolute; top:64px; left:50%;
    transform:translateX(-50%) translateY(-8px);
    background:rgba(255,255,255,.95); color:#4a3420; font-weight:700;
    padding:10px 22px; border-radius:16px;
    font-size:clamp(13px,2.6vw,19px);
    box-shadow:0 6px 16px rgba(0,0,0,.25);
    opacity:0; pointer-events:none; max-width:82%; text-align:center;
    transition:opacity .5s ease, transform .5s ease;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px;
    background:rgba(10,20,40,.72);
    color:#fff; text-align:center;
    padding:20px; box-sizing:border-box;
  }
  .overlay.hidden{display:none;}
  .overlay h1{
    margin:0; font-size:clamp(28px,6vw,52px);
    text-shadow:0 3px 0 rgba(0,0,0,.35);
  }
  .overlay p{ margin:0; font-size:clamp(14px,2.6vw,20px); opacity:.9; max-width:520px; }
  .btn{
    font-size:clamp(16px,3vw,22px);
    font-weight:800;
    padding:14px 34px;
    border-radius:16px;
    border:none;
    background:linear-gradient(#ffd94a,#ffb300);
    color:#5a3900;
    box-shadow:0 6px 0 #b87d00, 0 10px 18px rgba(0,0,0,.35);
    cursor:pointer;
    touch-action:manipulation;
  }
  .btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #b87d00; }
  #controls{
    position:absolute; left:0; right:0; bottom:0;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:16px; box-sizing:border-box;
    pointer-events:none;
  }
  .pad{ display:flex; gap:14px; pointer-events:auto; }
  .ctrl-btn{
    width:min(18vw,84px); height:min(18vw,84px);
    border-radius:50%;
    background:rgba(255,255,255,.25);
    border:3px solid rgba(255,255,255,.55);
    color:#fff; font-size:clamp(22px,4.4vw,32px);
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(2px);
    touch-action:none;
    -webkit-tap-highlight-color:transparent;
  }
  .ctrl-btn.active{ background:rgba(255,255,255,.5); }
  #jump-btn{
    width:min(22vw,100px); height:min(22vw,100px);
    font-size:clamp(13px,2.6vw,17px);
    font-weight:800;
  }
</style>
</head>
<body>
<div id="game-wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="chip">⭐ <span id="scoreVal">0</span></div>
    </div>
    <div id="toast"></div>

    <div id="controls">
      <div class="pad">
        <div class="ctrl-btn" id="btn-left">◀</div>
        <div class="ctrl-btn" id="btn-right">▶</div>
      </div>
      <div class="pad">
        <div class="ctrl-btn" id="jump-btn">JUMP</div>
      </div>
    </div>

    <div class="overlay" id="start-overlay">
      <h1>Abood's Adventure</h1>
      <p>Walk with ◀ ▶, hop with JUMP, and gently bump into the wobblers to boop them. Go at your own pace — there's no rush!</p>
      <button class="btn" id="play-btn">▶ Play</button>
      <p style="font-size:13px;opacity:.7;">Arrow keys / WASD + Space on a computer, or the on-screen buttons on a touch device.</p>
    </div>

    <div class="overlay hidden" id="win-overlay">
      <h1>🎉 You did it, Abood! 🎉</h1>
      <p id="win-score"></p>
      <button class="btn" id="win-again-btn">Play Again</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const HERO_NAME = "Abood";

  // ---------- Canvas setup ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 960, H = 540; // logical resolution
  canvas.width = W; canvas.height = H;

  const stage = document.getElementById('stage');
  function fitStage(){
    const wrapW = window.innerWidth, wrapH = window.innerHeight;
    const targetRatio = W / H;
    let w = Math.min(wrapW, 1000);
    let h = w / targetRatio;
    if(h > wrapH){ h = wrapH; w = h * targetRatio; }
    stage.style.width = w + 'px';
    stage.style.height = h + 'px';
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  // Slow, gentle, forgiving physics — built for a first-time 4-year-old player.
  const TILE = 40;
  const GRAVITY = 0.36;
  const MAX_FALL = 10;
  const MOVE_SPEED = 2.3;
  const JUMP_FORCE = -10;
  const COYOTE_FRAMES = 12;
  const GROUND_Y = H - TILE * 1.5;

  // ---------- Level definition ----------
  // Platforms: {x,y,w,h}
  const LEVEL_WIDTH = 3600;

  function buildLevel(){
    const platforms = [];
    // ground with a few forgiving pits (each easily clearable with a single jump)
    const groundSegments = [
      [0, 1050], [1140, 2050], [2160, 3020], [3130, LEVEL_WIDTH]
    ];
    groundSegments.forEach(([sx, ex]) => {
      platforms.push({x:sx, y:GROUND_Y, w: ex - sx, h: H - GROUND_Y, ground:true});
    });

    // floating platforms
    const floaters = [
      [520, GROUND_Y-110, 120],
      [760, GROUND_Y-190, 100],
      [1050, GROUND_Y-90, 3*TILE],
      [1360, GROUND_Y-170, 120],
      [1600, GROUND_Y-250, 120],
      [1860, GROUND_Y-150, 140],
      [2140, GROUND_Y-90, 3*TILE],
      [2360, GROUND_Y-200, 120],
      [2620, GROUND_Y-120, 140],
      [2960, GROUND_Y-90, 3*TILE],
      [3200, GROUND_Y-180, 140],
      [3400, GROUND_Y-260, 120],
    ];
    floaters.forEach(([x,y,w]) => platforms.push({x,y,w,h:24,ground:false}));

    // coins scattered along the path (and above floaters)
    const coins = [];
    function coinRow(x, y, count, gap){
      for(let i=0;i<count;i++) coins.push({x:x+i*gap, y, taken:false});
    }
    coinRow(560, GROUND_Y-150, 3, 34);
    coinRow(1070, GROUND_Y-130, 5, 34);
    coinRow(1620, GROUND_Y-290, 3, 34);
    coinRow(1880, GROUND_Y-190, 4, 34);
    coinRow(2160, GROUND_Y-130, 5, 34);
    coinRow(2640, GROUND_Y-160, 4, 34);
    coinRow(2980, GROUND_Y-130, 5, 34);
    coinRow(3420, GROUND_Y-300, 3, 34);
    coinRow(3480, GROUND_Y-40, 6, 34);

    // enemies: slow, easygoing "wobblers" that patrol gently (kept clear of pit edges)
    const enemies = [
      {x:700, minX:650, maxX:950, y:GROUND_Y-28, w:34, h:28, dir:1, alive:true, speed:0.7},
      {x:1400, minX:1360, maxX:1480, y:GROUND_Y-198, w:34, h:28, dir:1, alive:true, speed:0.6},
      {x:1650, minX:1600, maxX:1990, y:GROUND_Y-28, w:34, h:28, dir:1, alive:true, speed:0.75},
      {x:1900, minX:1860, maxX:2000, y:GROUND_Y-178, w:34, h:28, dir:-1, alive:true, speed:0.7},
      {x:2300, minX:2200, maxX:2900, y:GROUND_Y-28, w:34, h:28, dir:1, alive:true, speed:0.8},
      {x:2700, minX:2620, maxX:2760, y:GROUND_Y-148, w:34, h:28, dir:1, alive:true, speed:0.65},
      {x:3220, minX:3160, maxX:3400, y:GROUND_Y-28, w:34, h:28, dir:1, alive:true, speed:0.75},
    ];

    return {
      platforms, coins, enemies,
      flagX: LEVEL_WIDTH - 160,
      checkpointX: 2300,
      spawnX: 40,
    };
  }

  let level = buildLevel();

  // ---------- Player ----------
  function freshPlayer(x){
    return {
      x, y: GROUND_Y - 56,
      w: 30, h: 46,
      vx: 0, vy: 0,
      onGround:false,
      facing:1,
      animT:0,
      invincible:0,
      coyote:0,
    };
  }

  let player = freshPlayer(level.spawnX);
  let respawnX = level.spawnX;
  let score = 0;
  let camX = 0;
  let state = 'start'; // start | playing | win
  let elapsed = 0;
  let continuousRunTime = 0;
  let seen = {};

  function resetProgressFlags(){
    seen = {moved:false, jumped:false, coin:false, stomp:false, bumped:false, checkpoint:false, calmNudge:false};
  }
  resetProgressFlags();

  // ---------- Gentle toast messages ----------
  const toastEl = document.getElementById('toast');
  let toastQueue = [];
  let toastBusy = false;
  function toast(msg){
    toastQueue.push(msg);
    if(!toastBusy) nextToast();
  }
  function nextToast(){
    if(toastQueue.length === 0){ toastBusy = false; return; }
    toastBusy = true;
    toastEl.textContent = toastQueue.shift();
    toastEl.classList.add('show');
    setTimeout(()=>{
      toastEl.classList.remove('show');
      setTimeout(nextToast, 400);
    }, 2400);
  }

  // ---------- Input ----------
  const keys = {left:false, right:false, jump:false};

  window.addEventListener('keydown', e=>{
    if(['ArrowLeft','a','A'].includes(e.key)) keys.left = true;
    if(['ArrowRight','d','D'].includes(e.key)) keys.right = true;
    if(['ArrowUp','w','W',' '].includes(e.key)){ keys.jump = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', e=>{
    if(['ArrowLeft','a','A'].includes(e.key)) keys.left = false;
    if(['ArrowRight','d','D'].includes(e.key)) keys.right = false;
    if(['ArrowUp','w','W',' '].includes(e.key)) keys.jump = false;
  });

  function bindHold(el, onDown, onUp){
    const down = e=>{ e.preventDefault(); el.classList.add('active'); onDown(); };
    const up = e=>{ e.preventDefault(); el.classList.remove('active'); onUp(); };
    el.addEventListener('touchstart', down, {passive:false});
    el.addEventListener('touchend', up, {passive:false});
    el.addEventListener('touchcancel', up, {passive:false});
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  }
  bindHold(document.getElementById('btn-left'), ()=>keys.left=true, ()=>keys.left=false);
  bindHold(document.getElementById('btn-right'), ()=>keys.right=true, ()=>keys.right=false);
  bindHold(document.getElementById('jump-btn'), ()=>keys.jump=true, ()=>keys.jump=false);

  // ---------- Overlays ----------
  const startOverlay = document.getElementById('start-overlay');
  const winOverlay = document.getElementById('win-overlay');
  const scoreVal = document.getElementById('scoreVal');

  function showOnly(el){
    [startOverlay, winOverlay].forEach(o=> o.classList.toggle('hidden', o!==el));
  }

  document.getElementById('play-btn').addEventListener('click', startGame);
  document.getElementById('win-again-btn').addEventListener('click', startGame);

  function startGame(){
    level = buildLevel();
    player = freshPlayer(level.spawnX);
    respawnX = level.spawnX;
    score = 0; camX = 0; continuousRunTime = 0;
    resetProgressFlags();
    updateHud();
    state = 'playing';
    [startOverlay, winOverlay].forEach(o=>o.classList.add('hidden'));
  }

  function updateHud(){
    scoreVal.textContent = score;
  }

  // ---------- Collision helpers ----------
  function overlap(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function resolvePlatformsX(entity){
    for(const p of level.platforms){
      if(overlap(entity, p)){
        if(entity.vx > 0) entity.x = p.x - entity.w;
        else if(entity.vx < 0) entity.x = p.x + p.w;
      }
    }
  }
  function resolvePlatformsY(entity){
    entity.onGround = false;
    for(const p of level.platforms){
      if(overlap(entity, p)){
        if(entity.vy > 0){ entity.y = p.y - entity.h; entity.vy = 0; entity.onGround = true; }
        else if(entity.vy < 0){ entity.y = p.y + p.h; entity.vy = 0; }
      }
    }
  }

  function gentleRespawn(){
    player = freshPlayer(respawnX);
    toast("Oops! Let's try again 🙂");
  }

  // ---------- Update ----------
  function update(dt){
    if(state !== 'playing') return;
    elapsed += dt;

    // horizontal movement
    player.vx = 0;
    if(keys.left){ player.vx = -MOVE_SPEED; player.facing = -1; }
    if(keys.right){ player.vx = MOVE_SPEED; player.facing = 1; }
    if(player.vx !== 0){
      player.animT += dt;
      continuousRunTime += dt;
      if(!seen.moved){ seen.moved = true; toast("Nice! Keep going — there's no rush 🙂"); }
      if(continuousRunTime > 6 && !seen.calmNudge){
        seen.calmNudge = true;
        toast("You don't need to hurry, buddy — slow and steady is great!");
      }
    } else {
      continuousRunTime = 0;
    }

    player.coyote = player.onGround ? COYOTE_FRAMES : Math.max(0, player.coyote - 1);
    if(keys.jump && player.coyote > 0){
      player.vy = JUMP_FORCE;
      player.onGround = false;
      player.coyote = 0;
      if(!seen.jumped){ seen.jumped = true; toast("Great jump! Take your time."); }
    }

    player.x += player.vx;
    player.x = Math.max(0, Math.min(player.x, LEVEL_WIDTH - player.w));
    resolvePlatformsX(player);

    player.vy = Math.min(player.vy + GRAVITY, MAX_FALL);
    player.y += player.vy;
    resolvePlatformsY(player);

    if(player.invincible > 0) player.invincible -= dt;

    // fell into a pit — a calm, no-penalty do-over
    if(player.y > H + 100){
      gentleRespawn();
      return;
    }

    // checkpoint
    if(player.x > level.checkpointX){
      respawnX = level.checkpointX;
      if(!seen.checkpoint){ seen.checkpoint = true; toast("Halfway there! You're doing great."); }
    }

    // coins
    for(const c of level.coins){
      if(c.taken) continue;
      const cb = {x:c.x-12, y:c.y-12, w:24, h:24};
      if(overlap(player, cb)){
        c.taken = true; score += 10; updateHud();
        if(!seen.coin){ seen.coin = true; toast("⭐ You found a star!"); }
      }
    }

    // enemies — gentle wobblers; hop on top to boop them, bumping them is just a soft bounce-back
    for(const en of level.enemies){
      if(!en.alive) continue;
      en.x += en.dir * en.speed;
      if(en.x < en.minX || en.x + en.w > en.maxX) en.dir *= -1;

      if(overlap(player, en)){
        const stomping = player.vy > 0 && (player.y + player.h) - en.y < 22;
        if(stomping){
          en.alive = false;
          player.vy = JUMP_FORCE * 0.55;
          score += 50;
          updateHud();
          if(!seen.stomp){ seen.stomp = true; toast("You hopped on a wobbler — well done!"); }
        } else if(player.invincible <= 0){
          player.invincible = 1.4;
          player.vx = 0;
          player.vy = JUMP_FORCE * 0.45;
          player.x += (player.x < en.x ? -1 : 1) * 22;
          if(!seen.bumped){ seen.bumped = true; toast("Bump! Try hopping ON TOP of the wobbler next time."); }
        }
      }
    }

    // win
    if(player.x + player.w >= level.flagX){
      state = 'win';
      document.getElementById('win-score').textContent =
        `${HERO_NAME} collected ${score} stars — nice and calm the whole way!`;
      showOnly(winOverlay);
    }

    // camera — smoothed so the view eases along instead of snapping
    const camTarget = Math.max(0, Math.min(player.x - W/2 + player.w/2, LEVEL_WIDTH - W));
    camX += (camTarget - camX) * 0.12;
  }

  // ---------- Drawing ----------
  function drawBackground(){
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#5ec8f8');
    grad.addColorStop(1, '#bdf0ff');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // sun
    ctx.fillStyle = '#fff2a8';
    ctx.beginPath(); ctx.arc(W-90, 80, 40, 0, Math.PI*2); ctx.fill();

    // distant hills (parallax factor 0.3)
    const hillOffset = -camX * 0.3;
    ctx.fillStyle = '#8fd67a';
    for(let i=-1;i<8;i++){
      const hx = (i*300) + (hillOffset % 300);
      ctx.beginPath();
      ctx.ellipse(hx, GROUND_Y+40, 170, 90, 0, Math.PI, 0);
      ctx.fill();
    }
    // clouds parallax 0.5
    const cloudOffset = -camX * 0.5;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for(let i=-1;i<10;i++){
      const cx = (i*260) + (cloudOffset % 260);
      const cy = 60 + (i%3)*35;
      drawCloud(cx, cy);
    }
  }
  function drawCloud(x,y){
    ctx.beginPath();
    ctx.arc(x,y,18,0,Math.PI*2);
    ctx.arc(x+20,y-8,22,0,Math.PI*2);
    ctx.arc(x+42,y,18,0,Math.PI*2);
    ctx.fill();
  }

  function drawPlatforms(){
    for(const p of level.platforms){
      const sx = p.x - camX;
      if(sx + p.w < 0 || sx > W) continue;
      if(p.ground){
        ctx.fillStyle = '#8a5a2b';
        ctx.fillRect(sx, p.y, p.w, p.h);
        ctx.fillStyle = '#5fb84a';
        ctx.fillRect(sx, p.y, p.w, 12);
      } else {
        ctx.fillStyle = '#c97b3d';
        ctx.fillRect(sx, p.y, p.w, p.h);
        ctx.fillStyle = '#5fb84a';
        ctx.fillRect(sx, p.y, p.w, 8);
      }
    }
  }

  function drawCoins(){
    for(const c of level.coins){
      if(c.taken) continue;
      const sx = c.x - camX;
      if(sx < -20 || sx > W+20) continue;
      const bob = Math.sin((elapsed*3) + c.x) * 3;
      ctx.fillStyle = '#ffd94a';
      ctx.beginPath();
      ctx.arc(sx, c.y + bob, 10, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#b8860b';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  function drawEnemies(){
    for(const en of level.enemies){
      if(!en.alive) continue;
      const sx = en.x - camX;
      if(sx + en.w < 0 || sx > W) continue;
      ctx.fillStyle = '#8e5bd6';
      ctx.beginPath();
      ctx.ellipse(sx+en.w/2, en.y+en.h/2, en.w/2, en.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      // eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx+en.w/2-7, en.y+en.h/2-4, 5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+en.w/2+7, en.y+en.h/2-4, 5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(sx+en.w/2-7+en.dir*2, en.y+en.h/2-4, 2.4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+en.w/2+7+en.dir*2, en.y+en.h/2-4, 2.4,0,Math.PI*2); ctx.fill();
    }
  }

  function drawFlag(){
    const sx = level.flagX - camX;
    if(sx < -40 || sx > W+40) return;
    ctx.fillStyle = '#8a5a2b';
    ctx.fillRect(sx, GROUND_Y-260, 8, 260);
    ctx.fillStyle = state==='win' ? '#ffd94a' : '#ff5a5a';
    ctx.beginPath();
    ctx.moveTo(sx+8, GROUND_Y-250);
    ctx.lineTo(sx+70, GROUND_Y-230);
    ctx.lineTo(sx+8, GROUND_Y-210);
    ctx.closePath();
    ctx.fill();
  }

  // Abood placeholder character — simple friendly cartoon avatar with his cochlear implants.
  function drawPlayer(){
    const sx = player.x - camX;
    const sy = player.y;
    const w = player.w, h = player.h;
    const bob = player.onGround && player.vx !== 0 ? Math.sin(player.animT*10)*3 : 0;

    ctx.save();
    ctx.globalAlpha = player.invincible > 0 ? 0.55 : 1;
    ctx.translate(sx + w/2, 0);
    ctx.scale(player.facing, 1);
    ctx.translate(-w/2, 0);

    // legs
    ctx.fillStyle = '#2b3a67';
    ctx.fillRect(4, sy+h-14, 10, 14);
    ctx.fillRect(w-14, sy+h-14, 10, 14);
    ctx.fillStyle = '#1c274a';
    ctx.fillRect(2, sy+h-4, 12, 6);
    ctx.fillRect(w-14, sy+h-4, 12, 6);

    // body/shirt
    ctx.fillStyle = '#1fb6a6';
    ctx.fillRect(2, sy+h-34+bob*0, w-4, 22);

    // arms
    ctx.fillStyle = '#f2c19c';
    ctx.fillRect(-3, sy+h-30, 8, 16);
    ctx.fillRect(w-5, sy+h-30, 8, 16);

    // head
    ctx.fillStyle = '#f2c19c';
    ctx.beginPath();
    ctx.arc(w/2, sy+h-40, 13, 0, Math.PI*2);
    ctx.fill();

    // ears (skin) — drawn before hair/implants so the implant sits on top of the ear
    ctx.fillStyle = '#f2c19c';
    ctx.beginPath(); ctx.ellipse(w/2-12.5, sy+h-38, 3, 4.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(w/2+12.5, sy+h-38, 3, 4.5, 0, 0, Math.PI*2); ctx.fill();

    // hair — short, dark, side-swept
    ctx.fillStyle = '#2a1a10';
    ctx.beginPath();
    ctx.arc(w/2, sy+h-46, 13, Math.PI, Math.PI*2);
    ctx.fill();
    ctx.fillRect(w/2-13, sy+h-46, 26, 5);
    ctx.beginPath();
    ctx.moveTo(w/2-13, sy+h-46);
    ctx.quadraticCurveTo(w/2-6, sy+h-52, w/2+4, sy+h-49);
    ctx.lineTo(w/2+2, sy+h-45);
    ctx.closePath();
    ctx.fill();

    // cochlear implants — behind-the-ear processor + coil, both sides
    [-1, 1].forEach(side=>{
      const ex = w/2 + side*12.5;
      ctx.fillStyle = '#c9c2b8';
      ctx.beginPath();
      ctx.ellipse(ex + side*2, sy+h-42, 2.6, 5.2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#8a8378';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(ex + side*1, sy+h-39);
      ctx.quadraticCurveTo(ex - side*1.5, sy+h-36, ex, sy+h-34);
      ctx.stroke();
      ctx.fillStyle = '#d8d2c8';
      ctx.beginPath();
      ctx.arc(ex, sy+h-34, 1.6, 0, Math.PI*2);
      ctx.fill();
    });

    // face
    ctx.fillStyle = '#2b2b2b';
    ctx.beginPath(); ctx.arc(w/2+5, sy+h-40, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w/2-3, sy+h-40, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#2b2b2b';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(w/2+1, sy+h-35, 3, 0.2, Math.PI-0.2);
    ctx.stroke();

    ctx.restore();
  }

  function draw(){
    drawBackground();
    drawPlatforms();
    drawCoins();
    drawFlag();
    drawEnemies();
    if(state==='playing' || state==='win') drawPlayer();
  }

  // ---------- Main loop ----------
  let lastT = performance.now();
  function loop(t){
    const dt = Math.min((t - lastT)/1000, 1/30);
    lastT = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  document.title = `${HERO_NAME}'s Adventure`;
})();
</script>
</body>
</html>
